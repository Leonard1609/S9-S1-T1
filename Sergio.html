<!DOCTYPE html>
<html>
<hr>
<div id="fun-section" style="text-align: center; padding: 20px; font-family: 'Courier New', Courier, monospace; background-color: #1a1a1a; color: #0f0; border-radius: 15px; margin: 20px;">
    
    <h2>🚀 Modo Hacker Activado</h2>
    <p id="status-text">Estado del repositorio: <strong>Sincronizado</strong></p>
    
    <button onclick="activarModoHacker()" style="background-color: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; box-shadow: 0 0 10px #0f0;">
        ¡PRESIONAR EN CASO DE ERROR!
    </button>

    <div id="console-output" style="margin-top: 20px; font-size: 0.8em; text-align: left; background: #000; padding: 10px; border: 1px solid #0f0; height: 100px; overflow-y: hidden;">
        > Esperando comandos...<br>
        > Repositorio detectado...<br>
        > Git commit -m "Mi código es arte"...
    </div>
</div>

<script>
    function activarModoHacker() {
        const status = document.getElementById('status-text');
        const consoleOut = document.getElementById('console-output');
        const body = document.body;

        // Cambiar texto
        status.innerHTML = "⚠️ ¡PELIGRO! DEMASIADO CÓDIGO GENIAL ⚠️";
        status.style.color = "red";
        
        // Agregar logs falsos a la consola
        consoleOut.innerHTML += "<br>> Inicializando protocolo de fiesta...<br>> Eliminando bugs...<br>> Instalando café virtual...";
        
        // Efecto visual: Cambia el fondo de toda la página por un momento
        body.style.transition = "0.5s";
        body.style.backgroundColor = "#002b36";
        
        alert("¡Felicidades! Has integrado Git con éxito. El repositorio está a salvo.");
    }
</script>
</html>
