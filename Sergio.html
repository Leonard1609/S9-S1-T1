<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil Colaborativo</title>
    <style>
        /* Estilos sencillos y modernos */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 300px;
        }

        img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 1.5rem; }

        .links { display: flex; flex-direction: column; gap: 10px; }

        .link {
            background: white;
            color: #764ba2;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        .link:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar">
        
        <h1>Hola, soy [Tu Nombre]</h1>
        <p>Desarrollador en formación | Git Enthusiast</p>

        <div class="links">
            <a href="#" class="link">🌐 Mi Portafolio</a>
            <a href="https://github.com" class="link">💻 Mi GitHub</a>
            <a href="#" class="link">✉️ Contacto</a>
        </div>
    </div>

</body>
</html>
